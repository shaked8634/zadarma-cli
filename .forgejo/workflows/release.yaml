name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: act-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist/release
          VERSION=$(echo ${{ forge.ref_name }} | sed 's/^v//')
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION" -v -o dist/release/zadarma-linux-amd64 ./cmd/zadarma
          ls -la dist/release/

      - name: Upload release
        uses: actions/forgejo-release@v2.11.1
        with:
          direction: upload
          url: https://forgejo.o-st.dev
          repo: ST_Consultancy/zadarma-cli
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ forge.ref_name }}
          release-dir: dist/release
          release-notes-file: release-notes/${{ forge.ref_name }}.md
          override: true
