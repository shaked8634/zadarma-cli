name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: act-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary (linux/amd64)
        run: |
          mkdir -p dist/release
          GOOS=linux GOARCH=amd64 go build -v -o dist/release/zadarma-linux-amd64 ./cmd/zadarma
          ls -la dist/release/

      - name: Create release
        id: create_release
        uses: actions/forgejo-release@v2.11.1
        with:
          direction: upload
          url: https://forgejo.o-st.dev
          repo: voidclaw/zadarma-cli
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v0.0.2
          release-dir: dist/release
          release-notes: "v0.0.2 - Maintenance release with version correction and workflow improvements"
