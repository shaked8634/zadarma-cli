name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: act-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary (linux/amd64)
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -v -o dist/zadarma-linux-amd64 ./cmd/zadarma
          ls -la dist/

      - name: Create release
        uses: actions/forgejo-release@v2.6.0
        with:
          direction: upload
          tag: ${{ github.ref_name }}
          release-dir: dist
          release-notes: "Release ${{ github.ref_name }} - zadarma-cli binary for linux/amd64"
          override: true

      - name: Debug release assets
        run: |
          ls -R dist/
          echo "Release ID and asset upload check (manual fallback)"
          # We'll see the logs from the forgejo-release action above to confirm upload
