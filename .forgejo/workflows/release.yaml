name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: act-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary (linux/amd64)
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -v -o dist/zadarma-linux-amd64 ./cmd/zadarma
          ls -la dist/

      - name: Create release
        id: create_release
        uses: https://code.forgejo.org/forgejo/release-action@v1.4.1
        with:
          direction: upload
          release-dir: dist
          files: zadarma-linux-amd64
          tag-name: ${{ github.ref_name }}
          release-name: "Release ${{ github.ref_name }}"
          release-note: "Release ${{ github.ref_name }} - zadarma-cli binary for linux/amd64"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
