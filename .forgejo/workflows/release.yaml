name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: act-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build -v -o zadarma-linux-amd64 ./cmd/zadarma

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release
        id: create_release
        uses: https://code.forgejo.org/forgejo/release-action@v1
        with:
          direction: upload
          release-dir: .
          files: zadarma-linux-amd64
          tag-name: ${{ steps.version.outputs.VERSION }}
          release-name: "Release ${{ steps.version.outputs.VERSION }}"
          release-note: "Release ${{ steps.version.outputs.VERSION }} - zadarma-cli binary for linux/amd64"
