name: Test & Lint

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  
jobs:
  test:
    runs-on: act-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          
      - name: Run tests
        run: go test ./... -v

      - name: Build binary
        run: |
          pwd
          find . -maxdepth 3 -not -path '*/.*'
          go build -v -o /tmp/zadarma-cli ./cmd/zadarma

      - name: Renovate
        uses: https://github.com/renovatebot/github-action@v46.1.1
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_AUTODISCOVER: false
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: forgejo
          RENOVATE_ENDPOINT: https://forgejo.o-st.dev/api/v1
          GIT_AUTHOR_NAME: Renovate Bot
          GIT_AUTHOR_EMAIL: renovate-bot@o-st.dev
          GIT_COMMITTER_NAME: Renovate Bot
          GIT_COMMITTER_EMAIL: renovate-bot@o-st.dev
          RENOVATE_GIT_AUTHOR: Renovate Bot <renovate-bot@o-st.dev>
          RENOVATE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
