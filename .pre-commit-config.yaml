repos:
  - repo: local
    hooks:
      - id: format
        name: gofmt
        entry: gofmt -w
        language: system
        types: [go]

      - id: lint
        name: golangci-lint
        entry: golangci-lint run --timeout 5m
        language: system
        types: [go]
        pass_filenames: false

      - id: test
        name: go test
        entry: go test ./...
        language: system
        types: [go]
        pass_filenames: false
